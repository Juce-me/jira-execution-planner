<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Jira Execution Planner</title>
    <link rel="icon" type="image/svg+xml" href="epm-burst.svg">
    <link rel="alternate icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/dist/dashboard.css">
</head>
<body>
    <div id="root"></div>
    <script>
    (() => {
      let lastAuthRefreshAt = 0;
      async function refreshAuthOnFocus() {
        if (document.visibilityState && document.visibilityState !== 'visible') return;
        const now = Date.now();
        if (now - lastAuthRefreshAt < 60000) return;
        lastAuthRefreshAt = now;
        try {
          const response = await fetch('/api/auth/refresh', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {'X-Requested-With': 'jira-execution-planner'},
          });
          if (response.status === 401) {
            const body = await response.json().catch(() => ({}));
            window.location.assign(body.loginUrl || '/login?reason=session_expired');
          }
        } catch (error) {
          // Leave network failures to the next focused attempt or API request.
        }
      }
      window.addEventListener('focus', refreshAuthOnFocus);
      document.addEventListener('visibilitychange', refreshAuthOnFocus);
      refreshAuthOnFocus();
    })();
    </script>
    <script defer src="frontend/dist/dashboard.js"></script>
</body>
</html>
