name: verify-frontend-build
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: npm ci
      - name: Install backend
        run: python -m pip install -r requirements.txt
      - name: Build frontend
        run: npm run build
      - name: Backend tests
        env:
          JIRA_AUTH_MODE: basic
          CONFIG_STORAGE_BACKEND: jsonfile
        run: python -m unittest discover -s tests
      - name: Endpoint security tests
        env:
          JIRA_AUTH_MODE: basic
          CONFIG_STORAGE_BACKEND: jsonfile
        run: python -m unittest tests.test_endpoint_policy_inventory tests.test_endpoint_security_matrix tests.test_network_bind_guards tests.test_security_headers tests.test_oauth_route_guards tests.test_backend_route_source_guards tests.test_route_move_preservation
      - name: Frontend tests
        run: npm run test:frontend:unit
      - name: Fail if dist changed
        run: |
          if ! git diff --exit-code; then
            echo "::error::Compiled frontend output changed. Run 'npm run build' and commit frontend/dist."
            git --no-pager diff
            exit 1
          fi
