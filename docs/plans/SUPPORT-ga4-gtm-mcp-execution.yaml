        - { variable: "DLV - event_type", operator: "equals", value: "pageview" }
    - name: "CE - userevent"
      type: "custom_event"
      event_name: "userevent"
      filters:
        - { variable: "DLV - trigger", operator: "equals", value: "userevent" }
        - { variable: "DLV - event_type", operator: "equals", value: "event" }

