sgtm:
  enabled: false
  clients: []
  tags: []
  transformations: []
  note: "Server-side GTM is out of scope for v1."

validation:
  forbidden_keys:
    exact:
      - "email"
      - "name"
      - "phone"
      - "ip"
      - "user_agent"
      - "user_id"
      - "session_id"
      - "cid"
      - "uid"
      - "customer_id"
      - "event_category"
      - "event_action"
      - "event_label"
      - "event_group"
      - "ga4_event_name"
    contains:
      - "token"
      - "secret"
      - "password"
      - "authorization"
      - "jira_url"
      - "home_url"
      - "jql"
      - "issue_key"
    patterns:
      - ".+@.+\\..+"
      - "https?://[^\\s?]+\\?[^\\s]+"

  required_checks:
    - "official_google_analytics_mcp_not_used_for_writes"
    - "custom_mcp_uses_new_gtm_workspace"
    - "dry_run_diff_generated"
    - "workspace_status_has_no_conflicts"
    - "measurement_id_matches_target_stream"
    - "manual_google_tag_send_page_view_false_confirmed"
    - "manual_enhanced_measurement_page_changes_false_confirmed"
    - "only_data_layer_events_pageview_and_userevent"
    - "normal_product_events_use_reusable_userevent_path"
    - "no_per_event_gtm_tag_or_trigger_explosion"
    - "event_name_used_as_ga4_event_name_not_parameter"
    - "ga4_user_id_mapped_only_to_user_id_in_manual_google_tag_setup"
    - "each_ga4_hit_has_at_most_25_event_parameters"
    - "no_raw_pii_or_secrets"
    - "no_universal_analytics_fields"
    - "no_event_group_or_ga4_event_name_fields"
    - "no_custom_dimension_for_user_id_session_id_url_jql_issue_key_or_names"
    - "consent_settings_not_modified"
    - "measurement_protocol_secret_not_created"
    - "create_container_version_blocked_without_explicit_approval"
    - "publish_blocked_without_explicit_approval"

  publish_gate:
    default_allowed: false
    create_container_version_allowed: false
    publish_allowed: false
    requires_human_approval: true
    requires_approval_token: true
    requires_successful_preview: true
    requires_validation_pass: true
    requires_diff_review: true

  destructive_change_guard:
    delete_gtm_entities: false
    archive_ga4_custom_definitions: false
    patch_existing_prod_tags_without_override: false

  pii_guard:
    disallow_raw_email: true
    disallow_raw_ip: true
    disallow_full_url_with_query_string: true
    disallow_user_id_as_custom_dimension: true

  consent_change_guard:
    modify_consent_settings: false
    modify_consent_initialization_tags: false
