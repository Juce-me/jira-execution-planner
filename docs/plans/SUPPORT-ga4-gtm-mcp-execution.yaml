# Dry-run desired state for configuring Jira Delivery Planner GA4/GTM with
# the current ga4-gtm-config-mcp validator. Replace placeholder resource names
# before any non-dry-run apply. `target.environment` must be one of
# dev/staging/prod; use "prod" only with production IDs and explicit approval.
---
status: planned
type: ga4_gtm_mcp_execution_spec
version: 1

target:
  environment: "staging"
  ga4_property_id: "properties/<GA4_PROPERTY_ID>"
  web_stream_id: "properties/<GA4_PROPERTY_ID>/dataStreams/<WEB_STREAM_ID>"
  measurement_id: "G-6QERX19WB0"
  gtm_account_id: "accounts/<GTM_ACCOUNT_ID>"
  gtm_web_container_id: "accounts/<GTM_ACCOUNT_ID>/containers/<GTM_WEB_CONTAINER_ID>"

source_artifacts:
  design_plan: "docs/plans/EXEC-ga4-instrumentation.md"
  setup_runbook: "docs/plans/SUPPORT-ga4-user-configuration.md"
  analytics_contract: "docs/README_ANALYTICS.md"

execution:
  mode: "dry_run"
  workspace_name: "ga4-jira-execution-planner-2026-05-29"
  publish_allowed: false
  require_human_approval: true
  approval_token_required: true
  destructive_changes_allowed: false
  create_container_version_allowed: false
  note: "Creating a GTM container version materializes the workspace into a version. Publishing changes live collection. Both require separate explicit approval."

preflight:
  required:
    - "source_plan_and_runbook_exist"
    - "target_ids_are_placeholders_or_operator_supplied"
    - "measurement_id_matches_target_stream"
    - "gtm_current_state_read"
    - "ga4_current_state_read"
    - "gtm_workspace_capacity_checked"
    - "no_conflicting_workspace_changes_detected"
    - "operator_confirms_internal_employee_analytics_policy"
    - "manual_google_tag_send_page_view_false_confirmed"
    - "manual_enhanced_measurement_safety_gate_reviewed"

