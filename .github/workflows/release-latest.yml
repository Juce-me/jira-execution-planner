name: release-latest
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install + build frontend
        run: |
          npm ci
          npm run build

      - name: Install backend
        run: python -m pip install -r requirements.txt

      - name: Backend tests
        env:
          JIRA_AUTH_MODE: basic
          CONFIG_STORAGE_BACKEND: jsonfile
        run: python -m unittest discover -s tests

      - name: Endpoint security tests
        env:
          JIRA_AUTH_MODE: basic
          CONFIG_STORAGE_BACKEND: jsonfile
        run: python -m unittest tests.test_endpoint_policy_inventory tests.test_endpoint_security_matrix tests.test_network_bind_guards tests.test_security_headers tests.test_oauth_route_guards tests.test_backend_route_source_guards tests.test_route_move_preservation

      - name: Ensure dist committed (defensive)
        run: |
          if ! git diff --exit-code; then
            echo "::error::Build output differs from committed dist. Fix by committing dist on main."
            git --no-pager diff
            exit 1
          fi

      - name: Write release info
        run: |
          echo "{\"hash\":\"$(git rev-parse HEAD)\",\"tag\":\"latest\",\"builtAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"source\":\"release\"}" > release-info.json

      - name: Create release zip
        run: |
          mkdir -p release-root
          cp -R backend planning frontend release-root/
          rm -rf release-root/frontend/src
          find release-root/frontend -mindepth 1 -maxdepth 1 ! -name dist -exec rm -rf {} +
          cp jira_server.py jira-dashboard.html requirements.txt install.sh pyproject.toml .env.example INSTALL.md README.md LICENSE release-info.json release-root/
          cp -R assets release-root/
          find release-root -name "__pycache__" -type d -prune -exec rm -rf {} +
          find release-root -name "*.pyc" -delete
          cd release-root
          zip -r ../jira-execution-planner-latest.zip .

      - name: Update 'latest' release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: latest
          allowUpdates: true
          artifacts: jira-execution-planner-latest.zip
          omitBody: true
